name: Security Scan

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  # Note: Snyk SaaS is already configured for this repository, which does not need a workflow to run
  trivy:
    uses: ./.github/workflows/security_component.yml
    secrets:
      slack_webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
